openapi: 3.1.0
info:
    title: UapService API
    version: 1.0.0
paths:
    /api/uap/v1/list-uap-sightings:
        get:
            tags:
                - UapService
            summary: ListUapSightings
            operationId: ListUapSightings
            parameters:
                - name: ne_lat
                  in: query
                  required: false
                  schema:
                    type: number
                    format: double
                - name: ne_lon
                  in: query
                  required: false
                  schema:
                    type: number
                    format: double
                - name: sw_lat
                  in: query
                  required: false
                  schema:
                    type: number
                    format: double
                - name: sw_lon
                  in: query
                  required: false
                  schema:
                    type: number
                    format: double
                - name: since_date
                  in: query
                  required: false
                  schema:
                    type: string
                    format: int64
                - name: source
                  in: query
                  required: false
                  schema:
                    type: string
                - name: min_credibility
                  in: query
                  required: false
                  schema:
                    type: number
                    format: double
                - name: page_size
                  in: query
                  required: false
                  schema:
                    type: integer
                    format: int32
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListUapSightingsResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/uap/v1/list-uap-institutional-reports:
        get:
            tags:
                - UapService
            summary: ListUapInstitutionalReports
            operationId: ListUapInstitutionalReports
            parameters:
                - name: org
                  in: query
                  required: false
                  schema:
                    type: string
                - name: limit
                  in: query
                  required: false
                  schema:
                    type: integer
                    format: int32
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListUapInstitutionalReportsResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/uap/v1/list-uap-sensor-stations:
        get:
            tags:
                - UapService
            summary: ListUapSensorStations
            operationId: ListUapSensorStations
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListUapSensorStationsResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/uap/v1/get-aai-scores:
        get:
            tags:
                - UapService
            summary: GetAaiScores
            operationId: GetAaiScores
            parameters:
                - name: region
                  in: query
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetAaiScoresResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
components:
    schemas:
        Error:
            type: object
            properties:
                message:
                    type: string
                    description: Error message (e.g., 'user not found', 'database connection failed')
            description: Error is returned when a handler encounters an error. It contains a simple error message that the developer can customize.
        FieldViolation:
            type: object
            properties:
                field:
                    type: string
                    description: The field path that failed validation (e.g., 'user.email' for nested fields). For header validation, this will be the header name (e.g., 'X-API-Key')
                description:
                    type: string
                    description: Human-readable description of the validation violation (e.g., 'must be a valid email address', 'required field missing')
            required:
                - field
                - description
            description: FieldViolation describes a single validation error for a specific field.
        ValidationError:
            type: object
            properties:
                violations:
                    type: array
                    items:
                        $ref: '#/components/schemas/FieldViolation'
                    description: List of validation violations
            required:
                - violations
            description: ValidationError is returned when request validation fails. It contains a list of field violations describing what went wrong.
        ListUapSightingsRequest:
            type: object
            properties:
                neLat:
                    type: number
                    format: double
                neLon:
                    type: number
                    format: double
                swLat:
                    type: number
                    format: double
                swLon:
                    type: number
                    format: double
                sinceDate:
                    type: integer
                    format: int64
                    description: 'Warning: Values > 2^53 may lose precision in JavaScript'
                source:
                    type: string
                minCredibility:
                    type: number
                    format: double
                pageSize:
                    type: integer
                    format: int32
        ListUapSightingsResponse:
            type: object
            properties:
                sightings:
                    type: array
                    items:
                        $ref: '#/components/schemas/UapSighting'
        UapSighting:
            type: object
            properties:
                id:
                    type: string
                    minLength: 1
                lat:
                    type: number
                    format: double
                lon:
                    type: number
                    format: double
                timestamp:
                    type: integer
                    format: int64
                    description: 'Warning: Values > 2^53 may lose precision in JavaScript'
                source:
                    type: string
                shape:
                    type: string
                description:
                    type: string
                credibilityScore:
                    type: number
                    format: double
            required:
                - id
            description: UapSighting represents a single UAP sighting report (NUFORC, Enigma, etc.).
        ListUapInstitutionalReportsRequest:
            type: object
            properties:
                org:
                    type: string
                limit:
                    type: integer
                    format: int32
        ListUapInstitutionalReportsResponse:
            type: object
            properties:
                reports:
                    type: array
                    items:
                        $ref: '#/components/schemas/UapInstitutionalReport'
        UapInstitutionalReport:
            type: object
            properties:
                id:
                    type: string
                    minLength: 1
                org:
                    type: string
                title:
                    type: string
                url:
                    type: string
                publishedAt:
                    type: integer
                    format: int64
                    description: 'Warning: Values > 2^53 may lose precision in JavaScript'
                reportType:
                    type: string
            required:
                - id
            description: UapInstitutionalReport represents an official report from AARO, NASA, GEIPAN, etc.
        ListUapSensorStationsRequest:
            type: object
        ListUapSensorStationsResponse:
            type: object
            properties:
                stations:
                    type: array
                    items:
                        $ref: '#/components/schemas/UapSensorStation'
        UapSensorStation:
            type: object
            properties:
                id:
                    type: string
                    minLength: 1
                name:
                    type: string
                lat:
                    type: number
                    format: double
                lon:
                    type: number
                    format: double
                type:
                    type: string
                status:
                    type: string
            required:
                - id
            description: UapSensorStation represents a fixed sensor site (Galileo Project, Skinwalker Ranch, etc.).
        GetAaiScoresRequest:
            type: object
            properties:
                region:
                    type: string
        GetAaiScoresResponse:
            type: object
            properties:
                scores:
                    type: array
                    items:
                        $ref: '#/components/schemas/AaiScore'
        AaiScore:
            type: object
            properties:
                regionId:
                    type: string
                score:
                    type: number
                    format: double
                level:
                    type: string
                trend:
                    type: string
                sightingDensity:
                    type: number
                    format: double
                institutionalActivity:
                    type: number
                    format: double
                lastUpdated:
                    type: integer
                    format: int64
                    description: 'Warning: Values > 2^53 may lose precision in JavaScript'
            description: AaiScore represents the Anomalous Activity Index for a region.
